<div class="bg-white p-4 sm:p-5 rounded-xl border border-gray-200 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 hover:border-gray-300 transition-colors">
    <div class="flex-grow min-w-0">
        <h3 class="font-bold text-gray-900 truncate">{{ event.title }}</h3>
        <div class="flex items-center gap-1.5 mt-1 text-xs text-gray-500">
            <svg class="h-3.5 w-3.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
            <span>{{ event.start_date|date:"F j, Y" }} at {{ event.start_time|time:"g:i A" }}</span>
        </div>
    </div>
    <div class="flex-shrink-0 w-full sm:w-56">
        <div class="flex justify-between items-baseline mb-1.5">
            <span class="text-xs font-medium text-gray-500">Check-ins</span>
            <span class="text-xs font-bold text-gray-800">{{ event.used_ticket }} / {{ event.max_capacity }}</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-1.5 mb-3">
            <div class="bg-brand-600 h-1.5 rounded-full transition-all" style="width: {{ event.percentage }}%"></div>
        </div>
        <a href="{% url 'validate_ticket' event.slug %}" class="w-full inline-flex items-center justify-center gap-2 bg-brand-600 text-white font-semibold py-2.5 px-4 rounded-xl hover:bg-brand-700 text-sm transition-all active:scale-[0.98]">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5z"/></svg>
            Start Scanning
        </a>
    </div>
</div>
