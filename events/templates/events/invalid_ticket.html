{% extends 'base.html' %}

{% block title %}Invalid Ticket{% endblock title %}

{% block main %}
<main class="flex-grow flex items-center justify-center py-8 px-4">
    <div class="max-w-sm w-full bg-white p-6 rounded-2xl border border-gray-200 shadow-sm text-center">
        <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-5">
            <svg class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Ticket Invalid</h1>
        <p class="text-sm text-gray-500 mb-6">The QR code is not recognized.</p>

        <div class="text-left p-4 bg-red-50 border border-red-100 rounded-xl mb-6">
            <p class="text-sm font-semibold text-red-800 mb-1">Reason for Failure</p>
            <p class="text-sm text-red-700">This ticket code was <strong>not found</strong> in the system. Please verify the guest has a valid ticket.</p>
        </div>

        <a href="{% url 'check_in' %}" class="block w-full bg-brand-600 text-white font-semibold py-2.5 px-4 rounded-xl hover:bg-brand-700 transition-all active:scale-[0.98] text-sm">Scan Again</a>
    </div>
</main>
{% endblock main %}
