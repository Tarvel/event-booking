{% extends 'base.html' %}

{% block title %}Scan — {{ event.title|title }}{% endblock title %}

{% block main %}
<main class="flex-grow flex items-center justify-center py-8 px-4">
    <div class="max-w-sm w-full">
        <div class="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
            <div class="text-center mb-6">
                <h1 class="text-xl font-bold text-gray-900">Ticket Scanner</h1>
                <p class="mt-1 text-sm text-gray-500">Align the QR code within the frame.</p>
            </div>
            <div id="qr-reader" class="w-full rounded-xl overflow-hidden border-2 border-gray-300 bg-gray-950"></div>
        </div>
    </div>
</main>

<form id="qr-form" method="post" action="{% url 'validate_ticket' event.slug %}">
    {% csrf_token %}
    <input type="hidden" name="qr_data" id="qr-data">
</form>

<script>
    let html5QrCode;
    function onScanSuccess(decodedText) {
        const readerDiv = document.getElementById("qr-reader");
        readerDiv.innerHTML = `<div class="p-8 text-center text-brand-600 font-semibold text-sm">✓ Scan successful! Validating...</div>`;
        readerDiv.style.borderColor = '#16a34a';
        document.getElementById("qr-data").value = decodedText;
        html5QrCode.stop().then(() => {
            document.getElementById("qr-form").submit();
        }).catch(() => {
            document.getElementById("qr-form").submit();
        });
    }
    document.addEventListener("DOMContentLoaded", function () {
        if (typeof Html5Qrcode === "undefined") {
            document.getElementById("qr-reader").innerText = "Error: QR Scanner could not load.";
            return;
        }
        html5QrCode = new Html5Qrcode("qr-reader");
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length) {
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, onScanSuccess).catch(err => {
                    document.getElementById("qr-reader").innerText = "Error starting camera. Please grant permission.";
                });
            } else {
                document.getElementById("qr-reader").innerText = "No cameras found.";
            }
        }).catch(() => {
            document.getElementById("qr-reader").innerText = "Could not access camera.";
        });
    });
</script>
{% endblock main %}
