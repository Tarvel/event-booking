{% extends 'base.html' %}

{% block title %}Notifications — EventBook{% endblock title %}

{% block main %}
<main class="flex-grow container mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <div class="max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900">Notifications</h1>
            <a href="{% url 'mark_all_read' %}" class="text-sm font-semibold text-brand-600 hover:text-brand-700 transition-colors">Mark all as read</a>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
            <div class="p-3 border-b border-gray-100">
                <div id="filter-bar">{% include 'notifications/partials/filter.html' %}</div>
            </div>
            <div id="notif">{% include 'notifications/partials/notification_list.html' %}</div>
        </div>
    </div>
</main>
{% endblock main %}
