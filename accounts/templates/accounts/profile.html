{% extends 'base.html' %}
{% load static %}

{% block title %}My Profile — EventBook{% endblock title %}

{% block main %}
<main class="flex-grow container mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <h1 class="text-2xl sm:text-3xl font-extrabold text-gray-900 mb-6">My Profile</h1>

    <div class="grid grid-cols-1 lg:grid-cols-12 lg:gap-8">
        <!-- Sidebar -->
        <aside class="lg:col-span-4 mb-6 lg:mb-0">
            <div class="bg-white p-6 rounded-2xl border border-gray-200 text-center">
                <img class="w-20 h-20 rounded-full mx-auto mb-4 ring-4 ring-brand-100"
                     src="https://ui-avatars.com/api/?name={{ request.user.first_name|default:'U'}}&background=16a34a&color=fff&rounded=true&size=128&bold=true"
                     alt="{{ user.get_full_name }}">
                <h2 class="text-lg font-bold text-gray-900">{{ full_name|default:"Name not set" }}</h2>
                <p class="text-sm text-gray-500 mb-5">{{ user.email }}</p>
                <a href="{% url 'update_profile' %}" class="block w-full bg-gray-100 text-gray-700 font-semibold py-2.5 px-4 rounded-xl hover:bg-gray-200 transition-colors text-sm">
                    Edit Profile
                </a>
            </div>
        </aside>

        <!-- Registrations -->
        <div class="lg:col-span-8">
            <div class="bg-white p-5 sm:p-6 rounded-2xl border border-gray-200">
                <h2 class="text-lg font-bold text-gray-900 mb-5">My Registrations</h2>
                <div class="space-y-4">
                    {% include 'partials/registrations.html' %}
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock main %}
