{% if messages %}
<div class="fixed top-4 right-4 left-4 sm:left-auto z-[60] space-y-3 max-w-sm sm:max-w-md" id="toast-container">
    {% for message in messages %}
    {% with message_type=message.tags %}
    <div class="flash-alert animate-slide-in-top sm:animate-slide-in-right flex items-start gap-3 p-4 rounded-xl shadow-lg border backdrop-blur-sm transition-all duration-300
                {% if message_type == 'error' %}bg-red-50 border-red-200 text-red-800
                {% elif message_type == 'warning' %}bg-amber-50 border-amber-200 text-amber-800
                {% elif message_type == 'info' %}bg-blue-50 border-blue-200 text-blue-800
                {% else %}bg-emerald-50 border-emerald-200 text-emerald-800{% endif %}"
         role="alert">

        <!-- Icon -->
        <div class="flex-shrink-0 mt-0.5">
            {% if message_type == 'success' %}
            <svg class="w-5 h-5 text-emerald-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
            {% elif message_type == 'error' %}
            <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
            {% elif message_type == 'warning' %}
            <svg class="w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 10-2 0 1 1 0 002 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
            {% else %}
            <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
            {% endif %}
        </div>

        <!-- Text -->
        <div class="flex-1 min-w-0">
            <p class="text-sm font-semibold capitalize">{{ message_type }}</p>
            <p class="text-sm mt-0.5 opacity-90">{{ message }}</p>
        </div>

        <!-- Close -->
        <button class="flash-alert-close flex-shrink-0 p-1 rounded-lg opacity-60 hover:opacity-100 transition-opacity" aria-label="Close">
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        </button>

        <!-- Progress bar -->
        <div class="absolute bottom-0 left-0 right-0 h-0.5 rounded-b-xl overflow-hidden">
            <div class="toast-progress h-full
                        {% if message_type == 'error' %}bg-red-400
                        {% elif message_type == 'warning' %}bg-amber-400
                        {% elif message_type == 'info' %}bg-blue-400
                        {% else %}bg-emerald-400{% endif %}"></div>
        </div>
    </div>
    {% endwith %}
    {% endfor %}
</div>
{% endif %}
